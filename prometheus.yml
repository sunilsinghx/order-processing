scrape_configs:
  - job_name: 'api-service'
    scrape_interval: 5s
    static_configs:
      - targets: ['api:8080'] # Port where the API exposes /metrics

  - job_name: 'worker-service'
    scrape_interval: 5s
    static_configs:
      - targets: ['worker:8081'] # Port where your Worker exposes /metrics
      
  - job_name: rabbitmq
    static_configs:
      - targets:
          - rabbitmq:15692